<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper Berita & AI Caption Generator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-[95%] mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                <i class="fa-solid fa-newspaper text-indigo-600 me-2"></i>Scraper Berita Real-Time & AI Caption Generator
            </h1>
            <p class="text-slate-500 mt-1">Cari artikel berita terbaru dan hasilkan caption media sosial otomatis berbasis AI Gemini.</p>
        </header>

        <!-- FORM INPUT -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <form id="searchForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Topik Berita</label>
                    <input type="text" id="topik" placeholder="Contoh: Crypto, Gadget, AI" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Lokasi</label>
                    <select id="lokasi" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="Indonesia">Indonesia</option>
                        <option value="Global">Global (Internasional)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Rentang Waktu</label>
                    <select id="rentangWaktu" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="all" selected>Semua Waktu (Tanpa Batasan)</option>
                        <option value="24h">24 Jam Terakhir</option>
                        <option value="7d">7 Hari Terakhir</option>
                        <option value="30d">30 Hari Terakhir</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Jumlah Berita</label>
                    <input type="number" id="maxResults" value="15" min="1" max="50"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <div class="md:col-span-2 lg:col-span-4 mt-2">
                    <button type="submit" id="btnSubmit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition flex items-center justify-center gap-2 shadow-md hover:shadow-indigo-100">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Cari Berita</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- LOADING SPINNER -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent mb-3"></div>
            <p class="text-slate-600 font-medium">Sedang mengekstraksi artikel berita...</p>
        </div>

        <!-- TABEL HASIL -->
        <div id="resultContainer" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hidden">
            <div class="p-4 border-b border-slate-100 flex flex-wrap justify-between items-center bg-slate-50/50 gap-2">
                <div class="flex items-center gap-2">
                    <h2 class="font-bold text-slate-800">Hasil Pencarian</h2>
                    <span id="totalBadge" class="bg-indigo-100 text-indigo-700 text-xs font-semibold px-2.5 py-1 rounded-full">0 Berita</span>
                </div>
                
                <!-- Tombol Export -->
                <div class="flex items-center gap-2">
                    <button onclick="downloadFile('excel')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold py-2 px-3 rounded-lg transition flex items-center gap-1.5 shadow-sm">
                        <i class="fa-solid fa-file-excel"></i>
                        <span>Export Excel (.xlsx)</span>
                    </button>
                    <button onclick="downloadFile('csv')" class="bg-slate-700 hover:bg-slate-800 text-white text-xs font-semibold py-2 px-3 rounded-lg transition flex items-center gap-1.5 shadow-sm">
                        <i class="fa-solid fa-file-csv"></i>
                        <span>Export CSV</span>
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/70 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200">
                            <th class="p-3 w-12 text-center">NO</th>
                            <th class="p-3 w-1/3">JUDUL & RINGKASAN</th>
                            <th class="p-3 w-40">SUMBER</th>
                            <th class="p-3 w-1/3">CAPTION AI (DAPAT DIEDIT)</th>
                            <th class="p-3 w-36 text-center">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200 text-sm">
                        <!-- Data berita dimasukkan lewat JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        let currentBeritaData = [];

        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const topik = document.getElementById('topik').value;
            const lokasi = document.getElementById('lokasi').value;
            const rentangWaktu = document.getElementById('rentangWaktu').value;
            const maxResults = document.getElementById('maxResults').value;

            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const tableBody = document.getElementById('tableBody');
            const btnSubmit = document.getElementById('btnSubmit');

            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-50');

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topik: topik,
                        lokasi: lokasi,
                        rentang_waktu: rentangWaktu,
                        max_results: maxResults
                    })
                });

                const data = await response.json();
                tableBody.innerHTML = '';

                if (data.berita && data.berita.length > 0) {
                    currentBeritaData = data.berita;
                    document.getElementById('totalBadge').innerText = `${data.total} Berita Ditemukan`;

                    data.berita.forEach((item, index) => {
                        const row = `
                            <tr class="hover:bg-slate-50/80 transition align-top">
                                <td class="p-3 text-center font-semibold text-slate-400">${index + 1}</td>
                                
                                <!-- Judul & Ringkasan -->
                                <td class="p-3">
                                    <a href="${item.Sumber}" target="_blank" class="font-semibold text-indigo-600 hover:text-indigo-800 line-clamp-2 mb-1">
                                        ${item.Judul}
                                    </a>
                                    <p class="text-slate-500 text-xs leading-relaxed">${item['Deskripsi Artikel']}</p>
                                </td>

                                <!-- Sumber -->
                                <td class="p-3 text-xs">
                                    <span class="font-bold text-slate-700 block mb-0.5">${item['Sumber Nama Website']}</span>
                                    <span class="text-slate-400 text-[11px] block">${item.Tanggal}</span>
                                </td>

                                <!-- Caption AI (Editable Textarea) -->
                                <td class="p-3">
                                    <textarea id="caption-${index}" rows="4" 
                                        placeholder="Klik tombol 'Create Caption' untuk menghasilkan caption otomatis via Gemini AI..."
                                        class="w-full text-xs p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition bg-slate-50/50 resize-y leading-relaxed text-slate-700"></textarea>
                                </td>

                                <!-- Aksi -->
                                <td class="p-3 text-center">
                                    <div class="flex flex-col gap-2 items-center">
                                        <button onclick="generateCaption(${index})" id="btn-caption-${index}" 
                                            class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white text-xs font-medium py-2 px-3 rounded-lg transition flex items-center justify-center gap-1.5 shadow-sm">
                                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                                            <span>Create Caption</span>
                                        </button>
                                        
                                        <a href="${item.Sumber}" target="_blank" 
                                           class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs py-1.5 px-3 rounded-lg transition inline-flex items-center justify-center gap-1" title="Buka Artikel Original">
                                            <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                            <span>Buka Link</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });

                    resultContainer.classList.remove('hidden');
                } else {
                    alert('Tidak ada berita yang ditemukan.');
                }

            } catch (error) {
                alert('Terjadi kesalahan saat mengambil data.');
                console.error(error);
            } finally {
                loading.classList.add('hidden');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-50');
            }
        });

        // --- FUNGSI GENERATE CAPTION VIA GEMINI AI ---
        async function generateCaption(index) {
            const item = currentBeritaData[index];
            const btn = document.getElementById(`btn-caption-${index}`);
            const textarea = document.getElementById(`caption-${index}`);

            // Set state loading pada tombol & textarea
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> Processing...`;
            textarea.placeholder = "Sedang membuat caption menarik menggunakan Gemini AI...";

            try {
                const response = await fetch('/api/generate-caption', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        judul: item.Judul,
                        deskripsi: item['Deskripsi Artikel'],
                        sumber: item['Sumber Nama Website']
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    textarea.value = data.caption;
                    currentBeritaData[index].Caption = data.caption;
                } else {
                    alert(`Gagal membuat caption: ${data.message}`);
                }
            } catch (err) {
                alert("Terjadi kesalahan koneksi ke server.");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Create Caption`;
            }
        }

        // --- FUNGSI DOWNLOAD FILE EXCEL / CSV ---
        async function downloadFile(format) {
            if (currentBeritaData.length === 0) {
                alert("Tidak ada data untuk diunduh.");
                return;
            }

            // Sync/update data caption dari textarea pengguna sebelum di-export
            currentBeritaData.forEach((item, idx) => {
                const textarea = document.getElementById(`caption-${idx}`);
                if (textarea) {
                    item.Caption = textarea.value;
                }
            });

            const endpoint = format === 'excel' ? '/api/export/excel' : '/api/export/csv';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ berita: currentBeritaData })
                });

                if (!response.ok) throw new Error('Gagal mendownload file');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `hasil_berita_dan_caption.${format === 'excel' ? 'xlsx' : 'csv'}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("Terjadi kesalahan saat mengunduh file.");
                console.error(err);
            }
        }
    </script>
</body>
</html>
